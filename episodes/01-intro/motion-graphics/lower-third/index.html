<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #000000;
      width: 1920px; height: 1080px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div
    data-composition-id="lower-third"
    data-width="1920"
    data-height="1080"
    data-start="0"
  >

    <div class="lt-wrap">
      <div class="stripe"></div>
      <div class="content">
        <div class="name">Andres Fuentes</div>
        <div class="title-line">Engineering Leader · 15+ Years</div>
      </div>

      <!-- Iridescent shimmer layer -->
      <div class="shimmer" aria-hidden="true"></div>
    </div>

    <style>
      :root {
        --brand-primary:     #2563EB;
        --brand-bg:          #0A0A0A;
        --brand-surface:     #161616;
        --brand-text:        #F5F5F5;
        --brand-text-dim:    #9CA3AF;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      [data-composition-id="lower-third"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        background: #000000;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
      }

      .lt-wrap {
        position: absolute;
        bottom: 9%;
        left: 6%;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        border-radius: 12px;
        overflow: hidden;

        /* Liquid glass base — min 0.28 opacity keeps pixels above colorkey threshold */
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.35) 0%,
          rgba(255, 255, 255, 0.28) 50%,
          rgba(255, 255, 255, 0.32) 100%
        );
        backdrop-filter: blur(24px) saturate(1.9) brightness(1.05);
        -webkit-backdrop-filter: blur(24px) saturate(1.9) brightness(1.05);

        /* Glass border — bright top edge, subtle sides */
        border-top: 1px solid rgba(255, 255, 255, 0.65);
        border-left: 1px solid rgba(255, 255, 255, 0.45);
        border-right: 1px solid rgba(255, 255, 255, 0.20);
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);

        /* Depth + glow */
        box-shadow:
          0 12px 40px rgba(0, 0, 0, 0.45),
          0 4px 12px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.55),
          inset 0 -1px 0 rgba(255, 255, 255, 0.10),
          0 0 0 0.5px rgba(255, 255, 255, 0.12);
      }

      /* Iridescent shimmer overlay */
      .shimmer {
        position: absolute;
        inset: 0;
        border-radius: 12px;
        background: linear-gradient(
          118deg,
          rgba(96, 200, 255, 0.10) 0%,
          rgba(180, 110, 255, 0.07) 30%,
          rgba(255, 160, 80,  0.05) 60%,
          rgba(80,  230, 160, 0.07) 85%,
          rgba(96, 200, 255, 0.10) 100%
        );
        pointer-events: none;
      }

      /* Brand-primary left accent stripe */
      .stripe {
        width: 3px;
        flex-shrink: 0;
        background: var(--brand-primary);
        box-shadow: 0 0 10px rgba(37,99,235,0.6), 0 0 20px rgba(37,99,235,0.25);
      }

      .content {
        padding: 14px 22px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        position: relative;
        z-index: 1;
      }

      .name {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 26px;
        color: var(--brand-text);
        line-height: 1.2;
        white-space: nowrap;
        text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      }

      .title-line {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        font-size: 16px;
        color: rgba(245, 245, 245, 0.80);
        line-height: 1.2;
        white-space: nowrap;
        text-shadow: 0 1px 3px rgba(0,0,0,0.35);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      // Slide in from left — 0.5s, easeOutCubic
      tl.from(".lt-wrap", {
        x: "-130%",
        duration: 0.5,
        ease: "power3.out"
      }, 0);

      // Hold 4.0s (0.5 → 4.5s — nothing)

      // Slide out to left — 0.4s, easeInCubic
      tl.to(".lt-wrap", {
        x: "-130%",
        duration: 0.4,
        ease: "power3.in"
      }, 4.5);

      window.__timelines["lower-third"] = tl;
    </script>

  </div>
</body>
</html>
