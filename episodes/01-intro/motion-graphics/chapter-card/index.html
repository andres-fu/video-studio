<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>
  <div
    data-composition-id="chapter-card"
    data-width="1920"
    data-height="1080"
    data-start="0"
  >

    <div class="card-content">
      <div class="chapter-num">01</div>
      <div class="chapter-title">Why 1-on-1s Actually Matter</div>
      <div class="chapter-rule"></div>
    </div>

    <style>
      :root {
        --brand-primary:     #2563EB;
        --brand-bg:          #0A0A0A;
        --brand-surface:     #161616;
        --brand-text:        #F5F5F5;
        --brand-text-dim:    #9CA3AF;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      [data-composition-id="chapter-card"] {
        width: 1920px;
        height: 1080px;
        position: relative;
        background: var(--brand-bg);
        overflow: hidden;
        font-family: 'Inter', sans-serif;
      }

      .card-content {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
      }

      .chapter-num {
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 32px;
        color: var(--brand-primary);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .chapter-title {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 96px;
        color: var(--brand-text);
        letter-spacing: -0.02em;
        line-height: 1.1;
        text-align: center;
        max-width: 1400px;
      }

      .chapter-rule {
        width: 25%;
        height: 2px;
        background: var(--brand-primary);
        transform-origin: center center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      // Sequential reveal — 1.0s total in
      // 1. Chapter number (0 → 0.35s)
      tl.from(".chapter-num", {
        opacity: 0,
        y: 16,
        duration: 0.35,
        ease: "power3.out"
      }, 0);

      // 2. Title (0.35s → 0.78s)
      tl.from(".chapter-title", {
        opacity: 0,
        y: 32,
        duration: 0.44,
        ease: "power2.out"
      }, 0.35);

      // 3. Rule draws in from center (0.78s → 1.0s)
      tl.from(".chapter-rule", {
        scaleX: 0,
        duration: 0.22,
        ease: "power3.out"
      }, 0.78);

      // Hold 2.0s — nothing from 1.0s to 3.0s

      // Fade out all — 0.5s, easeInCubic — final scene, exit allowed
      tl.to([".chapter-num", ".chapter-title", ".chapter-rule"], {
        opacity: 0,
        y: -20,
        duration: 0.5,
        ease: "power3.in"
      }, 3.0);

      window.__timelines["chapter-card"] = tl;
    </script>

  </div>
</body>
</html>
